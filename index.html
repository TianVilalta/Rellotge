<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1c1c1c;
  }

  /* ── IMATGE PRINCIPAL (pantalla completa) ── */
  #main-preview {
    position: fixed;
    inset: 0;

  }
  #main-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.35s ease, transform 0.5s cubic-bezier(0.16,1,0.3,1);
  }
  #main-preview img.fade {
    opacity: 0;
    transform: scale(1.02);
  }

  /* ── BARRA DE MINIATURES ── */
  .thumb-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 110px;
    background: rgba(20,20,20,0.55);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 16px;
    z-index: 10;
  }

  /* fletxes */
  .arr {
    background: none;
    border: none;
    color: rgba(255,255,255,0.4);
    font-size: 2rem;
    cursor: pointer;
    padding: 4px 12px;
    line-height: 1;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .arr:hover { color: rgba(255,255,255,0.9); }

  /* miniatures */
  .thumb-btn {
    width: 82px;
    height: 82px;
    padding: 0;
    border: 2px solid transparent;
    background: #2a2a2a;
    cursor: pointer;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
    transition: border-color 0.25s;
  }
  .thumb-btn img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    filter: brightness(0.55);
    transition: filter 0.3s, transform 0.3s;
  }
  .thumb-btn:hover img { filter: brightness(0.82); transform: scale(1.06); }
  .thumb-btn.active { border-color: rgba(255,255,255,0.75); }
  .thumb-btn.active img { filter: brightness(1); }
</style>
</head>
<body>

<!-- IMATGE GRAN -->
<div id="main-preview">
  <img id="main-img" src="images/4.png" alt="Imatge principal">
</div>

<!-- BARRA INFERIOR -->
<div class="thumb-bar">
  <button class="arr" id="arr-prev">&#8249;</button>

  <button class="thumb-btn active" data-index="0">
    <img src="images/1.png" alt="1">
  </button>
  <button class="thumb-btn" data-index="1">
    <img src="images/2.png" alt="2">
  </button>
  <button class="thumb-btn" data-index="2">
    <img src="images/3.png" alt="3">
  </button>

  <button class="arr" id="arr-next">&#8250;</button>
</div>

<script>
  const images = [
    { thumb: 'images/1.png', full: 'images/4.png' },
    { thumb: 'images/2.png', full: 'images/5.png' },
    { thumb: 'images/3.png', full: 'images/6.png' },
  ];

  let current = 0;
  const mainImg   = document.getElementById('main-img');
  const thumbBtns = document.querySelectorAll('.thumb-btn');

  function select(index) {
    const next = (index + images.length) % images.length;
    if (next === current) return;
    current = next;

    thumbBtns.forEach(b => b.classList.remove('active'));
    thumbBtns[current].classList.add('active');

    mainImg.classList.add('fade');
    setTimeout(() => {
      mainImg.src = images[current].full;
      mainImg.classList.remove('fade');
    }, 320);
  }

  thumbBtns.forEach(btn =>
    btn.addEventListener('click', () => select(+btn.dataset.index))
  );

  document.getElementById('arr-prev').addEventListener('click', () => select(current - 1));
  document.getElementById('arr-next').addEventListener('click', () => select(current + 1));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  select(current - 1);
    if (e.key === 'ArrowRight') select(current + 1);
  });
</script>
</body>
</html>
